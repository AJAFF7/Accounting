services:
  accounting:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: softmax-accounting
    networks:
      - accounting-network
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - USE_LOCAL_AUTHENTICATION=true
      - USE_DIT_THEME=false
      - DISABLE_PROFILE_UPDATE=false
      - SEED_SECURITY_ENABLED=true
      - SEED_SECURITY_DATA=true
      - SIGNUP_PAGE_URL=/connect/register
      - SyncSqlScripts=true
      - DB_CONTEXTS_COUNT=2
      - DB_CONTEXT_0_NAME=Admin
      - DB_CONTEXT_0_SERVER=192.168.200.20
      - DB_CONTEXT_0_DATABASE=SoftMaxAccounting
      - DB_CONTEXT_0_USER=max
      - DB_CONTEXT_0_PASSWORD=SoftMax123!@#
      - DB_CONTEXT_0_ACTIVE=true
      - DB_CONTEXT_1_NAME=Accounting
      - DB_CONTEXT_1_SERVER=192.168.200.20
      - DB_CONTEXT_1_DATABASE=SoftMaxAccounting
      - DB_CONTEXT_1_USER=max
      - DB_CONTEXT_1_PASSWORD=SoftMax123!@#
      - DB_CONTEXT_1_ACTIVE=true
      - REDIS_CONNECTION=redis:6379
      - BACKGROUND_SERVICES_ENABLED=false
      - DEFAULT_URL=/Admin/accounting
      - APP_LOGO=/app/manifest/web-app-manifest-192x192.png
      - AUTHENTICATION_PASSKEY_ENABLED=true
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: accounting-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - accounting-network
    depends_on:
      - accounting
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: accounting-redis
    networks:
      - accounting-network
    restart: unless-stopped

networks:
  accounting-network:
    driver: bridge
